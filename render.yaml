services:
  - type: web
    name: coingecko-graphql-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npm run migrate
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: COINGECKO_API_KEY
        sync: false

  - type: worker
    name: coingecko-sync-worker
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
